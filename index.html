<!DOCTYPE html>
<html lang="cs" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feelu Young Coach</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Baloo+2:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    :root,
    [data-theme="light"] {
      --bg: #f3f7fb;
      --bg-soft: #e8f2fb;
      --surface: rgba(255,255,255,0.88);
      --surface-2: rgba(255,255,255,0.7);
      --surface-3: rgba(42,88,140,0.08);
      --text: #173355;
      --text-muted: #516e93;
      --text-soft: #7b93b4;
      --primary: #ffc96f;
      --primary-strong: #f2b651;
      --accent: #74bee8;
      --accent-strong: #4ba4d6;
      --mint: #7ad7b4;
      --rose: #ff99a9;
      --danger: #ff7b8d;
      --border: rgba(23,51,85,0.10);
      --shadow: 0 18px 44px rgba(34, 71, 115, 0.12);
      --radius-xl: 30px;
      --radius-lg: 24px;
      --radius-md: 18px;
      --radius-sm: 14px;
      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-5: 20px;
      --space-6: 24px;
      --space-8: 32px;
      --space-10: 40px;
      --space-12: 48px;
    }

    [data-theme="dark"] {
      --bg: #173355;
      --bg-soft: #21446f;
      --surface: rgba(43,85,130,0.72);
      --surface-2: rgba(64,111,163,0.42);
      --surface-3: rgba(255,255,255,0.08);
      --text: #f8fbff;
      --text-muted: #d9e6fb;
      --text-soft: #abc4e3;
      --primary: #ffc96f;
      --primary-strong: #f0b958;
      --accent: #7fcdf3;
      --accent-strong: #56b5e5;
      --mint: #7edfb6;
      --rose: #ffadbc;
      --danger: #ff92a1;
      --border: rgba(255,255,255,0.12);
      --shadow: 0 20px 46px rgba(0,0,0,0.22);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      min-height: 100vh;
      font-family: "Nunito", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(116,190,232,0.24), transparent 28%),
        radial-gradient(circle at right bottom, rgba(255,201,111,0.22), transparent 24%),
        linear-gradient(180deg, var(--bg-soft), var(--bg));
      line-height: 1.55;
    }

    img, svg { display: block; max-width: 100%; }
    button, input, textarea { font: inherit; color: inherit; }
    button { border: none; background: none; cursor: pointer; }
    textarea { resize: vertical; }

    .skip-link {
      position: absolute;
      left: -999px;
      top: auto;
    }
    .skip-link:focus {
      left: 16px;
      top: 16px;
      background: white;
      color: #111;
      padding: 10px 14px;
      border-radius: 999px;
      z-index: 50;
    }

    .app-shell {
      width: min(100%, 560px);
      margin: 0 auto;
      min-height: 100vh;
      position: relative;
    }

    .screen {
      display: none;
      min-height: 100vh;
      padding: 18px 18px 108px;
    }
    .screen.active { display: block; }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
    }

    .brand-pill, .theme-btn {
      background: var(--surface-2);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }

    .brand-pill {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      border-radius: 999px;
      padding: 10px 14px;
    }

    .brand-mark {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: #173355;
      background: linear-gradient(180deg, var(--primary), var(--rose));
      flex-shrink: 0;
    }

    .brand-copy small {
      display: block;
      color: var(--text-soft);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      font-weight: 800;
    }

    .brand-copy strong {
      display: block;
      font-family: "Baloo 2", sans-serif;
      font-size: 18px;
      line-height: 1;
    }

    .theme-btn {
      width: 50px;
      height: 50px;
      border-radius: 18px;
      display: grid;
      place-items: center;
    }
